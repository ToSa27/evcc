template: cardata2mqtt
products:
  - brand: BMW
    description:
      generic: CarData via MQTT
  - brand: Mini
    description:
      generic: CarData via MQTT
requirements:
  description:
    de: |
      Verbindet sich mit einem eigenen MQTT-Broker, der BMW/Mini CarData-Daten bereitstellt. Die folgenden Datenpunkte müssen für Streaming konfiguriert werden:

      ```
      vehicle.body.chargingPort.status
      vehicle.cabin.infotainment.navigation.currentLocation.latitude
      vehicle.cabin.infotainment.navigation.currentLocation.longitude
      vehicle.cabin.hvac.preconditioning.status.comfortState
      vehicle.drivetrain.batteryManagement.header
      vehicle.drivetrain.electricEngine.charging.hvStatus
      vehicle.drivetrain.electricEngine.charging.status
      vehicle.drivetrain.electricEngine.charging.timeRemaining
      vehicle.drivetrain.electricEngine.kombiRemainingElectricRange
      vehicle.powertrain.electric.battery.stateOfCharge.target
      vehicle.vehicle.preConditioning.activity
      vehicle.vehicle.travelledDistance
      ```

      Aktualisierung der Daten erfolgt einmalig bei Neustart und wenn Streamingdaten eingehen. Dies ist ausschließlich der Fall,
      wenn das Fahrzeug aktiv Daten erzeugt.
    en: |
      Connects to a custom MQTT broker providing BMW/Mini CarData data. The following data points need to be configured for streaming access:

      ```
      vehicle.body.chargingPort.status
      vehicle.cabin.infotainment.navigation.currentLocation.latitude
      vehicle.cabin.infotainment.navigation.currentLocation.longitude
      vehicle.cabin.hvac.preconditioning.status.comfortState
      vehicle.drivetrain.batteryManagement.header
      vehicle.drivetrain.electricEngine.charging.hvStatus
      vehicle.drivetrain.electricEngine.charging.status
      vehicle.drivetrain.electricEngine.charging.timeRemaining
      vehicle.drivetrain.electricEngine.kombiRemainingElectricRange
      vehicle.powertrain.electric.battery.stateOfCharge.target
      vehicle.vehicle.preConditioning.activity
      vehicle.vehicle.travelledDistance
      ```

      Data will be updated on restart and when received using streaming. This only happens when the vehicle actively creates new updates.
params:
  - preset: vehicle-common
  - name: vin
    required: true
    example: WBMW...
  - name: broker
    description:
      generic: MQTT Broker
    required: true
    help:
      en: MQTT broker address (e.g. 192.168.1.100:1883 or tls://192.168.1.100:8883)
      de: MQTT-Broker-Adresse (z.B. 192.168.1.100:1883 oder tls://192.168.1.100:8883)
    example: 192.168.1.100:1883
  - name: user
    description:
      generic: MQTT User
    help:
      en: MQTT broker username
      de: MQTT-Broker-Benutzername
  - name: password
    description:
      generic: MQTT Password
    help:
      en: MQTT broker password
      de: MQTT-Broker-Passwort
    mask: true
  - name: prefix
    description:
      generic: Topic Prefix
    help:
      en: Topic prefix before {vin}/{key} (e.g. bmw/vehicles)
      de: Topic-Präfix vor {vin}/{key} (z.B. bmw/vehicles)
    example: bmw/vehicles
  - preset: vehicle-features
render: |
  type: cardata2mqtt
  vin: {{ .vin }}
  broker: {{ .broker }}
  {{ if .user }}user: {{ .user }}{{ end }}
  {{ if .password }}password: {{ .password }}{{ end }}
  {{ if .prefix }}prefix: {{ .prefix }}{{ end }}
  {{ include "vehicle-common" . }}
  {{ include "vehicle-features" . }}
